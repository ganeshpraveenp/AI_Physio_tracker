<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Physio Monitor - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --primary-hover:#3b82f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter",sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111418;
}

.card{
  width:400px;
  background:#11151c;
  padding:40px 35px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(37,99,235,0.15);
  color:#fff;
}

.logo{
  text-align:center;
  margin-bottom:25px;
}

.logo h1{
  font-size:18px;
  font-weight:600;
}

.logo p{
  font-size:12px;
  color:#9aa3b2;
  margin-top:5px;
}

.form-group{
  margin-bottom:18px;
}

label{
  font-size:12px;
  color:#9aa3b2;
  display:block;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:12px 14px;
  background:#0d1117;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;
  color:#9186b9;
  font-size:14px;
  outline:none;
}

input:focus{
  border-color:var(--primary);
}

.btn-primary{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-weight:500;
  cursor:pointer;
  margin-top:5px;
}

.btn-primary:hover{
  background:var(--primary-hover);
}

.signup{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  color:#9aa3b2;
}

.signup a{
  color:var(--primary);
  text-decoration:none;
  font-weight:500;
}

.footer-text{
  text-align:center;
  font-size:11px;
  color:#6b7280;
  margin-top:25px;
}

.flash{
  background:#1f2937;
  padding:10px;
  border-radius:8px;
  margin-bottom:15px;
  text-align:center;
  font-size:13px;
  color:#f87171;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<div style="font-size:30px;"></div>
<h1>AI PHYSIO MONITOR AND TRACKER</h1>
<p>Physiotherapy Monitoring System</p>
</div>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="flash">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form action="/login" method="POST">

<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Enter your password" required>
</div>

<button type="submit" class="btn-primary">Login →</button>

</form>

<div class="signup">
New Patient? <a href="/register">Register</a>
</div>

<div class="footer-text">
Physiotherapy Monitoring System
</div>

</div>

</body>
</html>

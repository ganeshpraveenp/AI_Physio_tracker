<!DOCTYPE html>
<html>
<head>
<title>Elbow Exercise</title>
</head>

<body>

<h2>Elbow Flexion Exercise</h2>

<label>Target Reps:</label>
<input type="number" id="target" value="10">

<button onclick="startExercise()">Start</button>

<br><br>

<img src="/video_feed" width="600">

<h3>Reps Count: <span id="reps">0</span></h3>

<h3>Message:</h3>
<div id="msg" style="border:1px solid black; padding:10px; width:300px;">
Waiting...
</div>

<script>

function startExercise(){

let target=document.getElementById("target").value

fetch("/start",{
method:"POST",
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:"target="+target
})

}


setInterval(function(){

fetch("/status")
.then(res => res.json())
.then(data => {

document.getElementById("reps").innerText = data.reps
document.getElementById("msg").innerText = data.msg

// IF TARGET COMPLETED → GO TO RESULTS PAGE
if(data.completed){

fetch("/save_result",{
method:"POST"
})
.then(response => response.json())
.then(data => {

window.location="/results"

})

}

})

},1000)

</script>

</body>
</html>

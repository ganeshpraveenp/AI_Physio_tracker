<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Physio Monitor - Exercise</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b1220;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:900px;
max-width:95%;
background:#111827;
padding:35px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(37,99,235,0.15);
}

h2{
text-align:center;
margin-bottom:25px;
}

.control-box{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:6px;
border:none;
outline:none;
width:80px;
text-align:center;
}

button{
background:#2563eb;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#3b82f6;
}

.video-box{
text-align:center;
margin-top:10px;
}

.video-box img{
border-radius:10px;
border:2px solid #2563eb;
}

.status{
display:flex;
justify-content:space-between;
margin-top:25px;
}

.rep-box{
font-size:20px;
}

.message-box{
border:1px solid #374151;
padding:15px;
border-radius:8px;
width:300px;
background:#0b1220;
}

</style>
</head>

<body>

<div class="container">

<!-- ✅ Dynamic Exercise Title -->
<h2 id="exerciseTitle"></h2>

<div class="control-box">

<label>Target Reps:</label>

<input type="number" id="target" value="10" min="1">

<button onclick="startExercise()">Start Exercise</button>

</div>

<!-- ✅ Hidden Exercise Value -->
<input type="hidden" id="exercise" value="{{ exercise }}">

<div class="video-box">
<img src="/video_feed" width="640">
</div>

<div class="status">

<div class="rep-box">
Reps Count: <span id="reps">0</span>
</div>

<div class="message-box" id="msg">
Waiting...
</div>

</div>

</div>

<script>

// ✅ Set dynamic title
let exercise = document.getElementById("exercise").value;
document.getElementById("exerciseTitle").innerText =
    exercise.charAt(0).toUpperCase() + exercise.slice(1) + " Exercise";

// ✅ Start Exercise
let isStarted = false;
function startExercise(){

    let target = document.getElementById("target").value;
    let exercise = document.getElementById("exercise").value;

    fetch("/start",{
        method:"POST",
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:"target=" + target + "&exercise=" + exercise
    });

    // ✅ START STATUS CHECKING ONLY AFTER CLICK
    isStarted = true;
}

// ✅ Live Status Update
setInterval(function(){

    if(!isStarted) return;   // 🔥 IMPORTANT LINE

    fetch("/status")
    .then(res=>res.json())
    .then(data=>{

        document.getElementById("reps").innerText = data.reps;
        document.getElementById("msg").innerText = data.msg;

        if(data.completed){

            isStarted = false; // 🔥 STOP LOOP AFTER COMPLETE

            fetch("/save_result",{
                method:"POST"
            })
            .then(res=>res.json())
            .then(data=>{
                window.location = "/results";
            });

        }

    });

},1000);

</script>

</body>
</html>
